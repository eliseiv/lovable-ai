# =============================================================================
# squid.conf — egress-proxy build-песочницы (Sprint 4, ADR-010 §C).
#
# Источник истины:
#   - docs/adr/ADR-010-build-sandbox-rootless-egress.md §C (egress-allowlist)
#   - docs/05-security.md → threat-model (Dependency supply-chain / Egress·SSRF)
#                         + "Граница egress-политики" (только build-sandbox)
#   - docs/07-deployment.md → env-контракт (NPM_REGISTRY_ALLOWLIST)
#
# Назначение: единственный разрешённый исходящий путь build-контейнера.
# Build-контейнер сидит в изолированной сети BUILD_EGRESS_NETWORK (internal:true,
# без выхода в интернет/внутреннюю сеть). Весь его egress идёт ТОЛЬКО через этот
# forward-proxy, который пропускает запросы ИСКЛЮЧИТЕЛЬНО к хостам npm-registry
# (NPM_REGISTRY_ALLOWLIST). Всё прочее — DROP (deny all по умолчанию).
#
# ВАЖНО (docs/05-security.md → Граница egress-политики): этот lockdown
# применяется ТОЛЬКО к build-песочнице. App-процессы (api/worker/beat) НЕ ходят
# через этот proxy — их egress к Anthropic / Adapty getProfile / Apple JWKS
# остаётся прямым и не ограничивается.
#
# Default-deny: правило безопасности squid — последним стоит `http_access deny
# all`; всё, что не разрешено явно выше, запрещается.
# =============================================================================

# --- Порт прокси (forward-proxy). Совпадает с http_proxy build-контейнера. ---
http_port 3128

# --- DNS over the proxy: build-контейнер сам DNS не резолвит (internal-сеть),
#     резолвинг делает squid. (Директива dns_v4_first удалена: устарела в
#     squid 6.13+ — preferential treatment A-записей больше не поддерживается;
#     поведение по умолчанию сохраняет резолвинг через proxy.) ---

# =============================================================================
# ACL
# =============================================================================

# --- Источник: build-контейнеры (Docker bridge). Прочее — deny. ---
# src-ACL расширен до 172.16.0.0/12 (весь RFC1918 Docker-bridge диапазон) как
# DEFENCE-IN-DEPTH поверх ПЕРВИЧНОЙ сетевой изоляции, а не как первичный контроль:
# egress-proxy слушает 3128 только на build_egress(internal:true)+egress_uplink и
# наружу порт НЕ публикует (нет ports:), build-контейнер сидит только в build_egress.
# Физически достучаться до proxy могут ЛИШЬ build-контейнеры данного инстанса —
# независимо от ширины src-ACL. Семантика контроля — «только build-контейнеры», а
# не «конкретная подсеть». /12 покрывает любой BUILD_EGRESS_SUBNET ⊂ /12 (corelysite
# 172.31, nexoraweb 172.30 и любой будущий /16) одним статическим конфигом для всех
# инстансов — без envsubst/шаблона/нового env-ключа. См. ADR-010 §C-2.
acl build_clients src 172.16.0.0/12

# --- Allowlist хостов npm-registry. Источник истины — NPM_REGISTRY_ALLOWLIST
#     (docs/07-deployment.md). Дефолт: весь домен npmjs.org (registry +
#     CDN-поддомены), ADR-010 §C допускает CDN npmjs. dstdomain с лидирующей
#     точкой `.npmjs.org` = сам домен И все его поддомены, поэтому ОДНОЙ строки
#     достаточно: `registry.npmjs.org` ею уже покрыт. Отдельную строку для
#     `registry.npmjs.org` убрали намеренно — squid 6.13+ делает дублирующий
#     subdomain ACL FATAL ("subdomain of '.npmjs.org' ... remove it"). ---
acl npm_registry dstdomain .npmjs.org

# --- Безопасные порты для CONNECT (https npm) и http. ---
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT

# --- Явный запрет private CIDR + cloud-metadata (ADR-010 §C, threat-model
#     Egress/SSRF). Дополняющий слой к internal-сети: даже если хост из
#     allowlist резолвится в приватный IP (DNS-rebind), запрещаем. ---
acl to_metadata  dst 169.254.169.254/32
acl to_private   dst 10.0.0.0/8
acl to_private   dst 172.16.0.0/12
acl to_private   dst 192.168.0.0/16
acl to_private   dst 127.0.0.0/8
acl to_linklocal dst 169.254.0.0/16

# =============================================================================
# http_access — порядок важен (первое совпадение выигрывает)
# =============================================================================

# 1. Жёсткий DROP метаданных/приватных адресатов — раньше любого allow,
#    чтобы DNS-rebind через allowlisted-имя не пробил SSRF.
http_access deny to_metadata
http_access deny to_linklocal
http_access deny to_private

# 2. Запрет небезопасных портов / CONNECT не на 443.
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# 3. Разрешаем ТОЛЬКО build-клиентам ТОЛЬКО к npm-registry.
http_access allow build_clients npm_registry

# 4. Default-deny: всё остальное запрещено (supply-chain / exfiltration / SSRF).
http_access deny all

# --- Не раскрываем апстриму инфраструктуру: убираем via/forwarded-заголовки. ---
via off
forwarded_for delete
httpd_suppress_version_string on

# --- Логи: пишем в штатные файлы образа /var/log/squid/*, владелец которых
#     `proxy` (uid 13) — тот самый user, до которого ubuntu/squid сбрасывает
#     привилегии. В docker logs их выносит САМ образ: его entrypoint.sh держит
#     `tail -F /var/log/squid/access.log` (+ cache/error/store) в фоне и
#     форвардит на stdout контейнера (см. infra/egress-proxy/README.md →
#     "Логирование"). Поэтому прямые `stdio:/dev/stdout` / `cache_log
#     stdio:/dev/stderr` УБРАНЫ: эти device-ноды принадлежат root, и после
#     privilege-drop до `proxy` squid падал `FATAL: Cannot open '/dev/stdout'`
#     / `Cannot open cache_log (/dev/stderr)` (несовместимо с образом ubuntu/squid).
#     Без кэша на диск (proxy, не accelerator). ---
cache deny all
access_log daemon:/var/log/squid/access.log squid
cache_log /var/log/squid/cache.log
